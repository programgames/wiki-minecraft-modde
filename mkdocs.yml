site_name: Wiki Minecraft Moddé
site_url: https://programgames.github.io/wiki-minecraft-modde/
site_description: Guide complet des mods Minecraft - Objets, Astuces, Guides
site_author: Julien
repo_url: https://github.com/programgames/wiki-minecraft-modde
repo_name: programgames/wiki-minecraft-modde

theme:
  name: material
  language: fr
  icon:
    logo: material/sword-cross
  palette:
    - scheme: default
      primary: teal
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Mode sombre
    - scheme: slate
      primary: teal
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Mode clair
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.tracking
    - navigation.indexes
    - search.suggest
    - search.highlight
    - content.tabs.link
    - content.code.copy
    - toc.follow

plugins:
  - search:
      lang: fr
  - tags:
      tags_file: tags.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.keys
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true
  - attr_list
  - md_in_html
  - def_list
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
      options:
        custom_icons:
          - overrides/.icons

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/programgames/wiki-minecraft-modde
  generator: false

copyright: Copyright &copy; 2024 Julien

nav:
  - Accueil: index.md
  - Astuces:
    - Vue d'ensemble: astuces/index.md
    - Progression:
      - Getting Started: astuces/getting-started.md
      - Early Game: astuces/early-game.md
      - Mid Game: astuces/mid-game.md
      - Late Game: astuces/late-game.md
    - Fondamentaux:
      - Raccourcis Clavier: astuces/keybinds.md
      - Maîtriser JEI: astuces/jei-mastery.md
      - Bases Automation: astuces/automation.md
      - Construction de Base: astuces/base-building.md
      - Organisation Coffres: astuces/organisation-coffres.md
    - Ressources:
      - Progression Énergie: astuces/energie.md
      - Enchantements: astuces/enchantements.md
      - Techniques de Farm: astuces/farming.md
    - Combat:
      - Préparation Boss: astuces/boss-prep.md
      - Progression Équipement: astuces/gear-progression.md
      - Dimensions: astuces/dimensions.md
    - Guides Avancés:
      - Astuces Avancées: astuces/advanced-tips.md
      - Synergies Inter-Mods: astuces/synergies.md
      - Setups Détaillés: astuces/setups.md
      - Guide du Vol: astuces/flight-guide.md
      - Farming Mob Drops: astuces/mob-drops-guide.md
      - Multiblocks: astuces/multiblocks.md
      - Integrated Dynamics: astuces/integrated-dynamics.md
    - Optimisation: astuces/optimisation.md
    - Erreurs Communes: astuces/erreurs-communes.md
    - Glossaire: astuces/glossaire.md
    - FAQ: astuces/faq.md
  - Catégories:
    - Magie: magie/index.md
    - Technologie: technologie/index.md
    - Utilitaire: utilitaire/index.md
    - Farming: farming/index.md
    - Combat: combat/index.md
    - Building: building/index.md
    - Stockage: stockage/index.md
    - Déplacement: deplacement/index.md
    - Énergie: energie/index.md
    - Mob Farm: mob-farm/index.md
    - QOL: qol/index.md
  - Tags: tags.md
